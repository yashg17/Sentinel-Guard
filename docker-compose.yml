services:
  app:
    build: .
    container_name: sentinel-app-1
    ports:
      - "5000:5000"
    networks:
      - sentinel-net
    restart: always

  sonarqube:
    image: sonarqube:9.9-community
    container_name: sonar-sonarqube-1
    ports:
      - "9005:9000"
    networks:
      - sentinel-net
    volumes:
      - sonarqube-data:/opt/sonarqube/data
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    user: root
    ports:
      - "9090:9090"
    volumes:
      - /home/ubuntu/prometheus.yml:/etc/prometheus/prometheus.yml
      - /home/ubuntu/prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - sentinel-net
    restart: always

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: cadvisor
    # REMOVED PORTS TO FIX YOUR ERROR FOREVER
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - sentinel-net
    restart: always

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    # REMOVED PORTS TO FIX YOUR ERROR FOREVER
    networks:
      - sentinel-net
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - sentinel-net
    restart: always

networks:
  sentinel-net:
    driver: bridge

volumes:
  sonarqube-data:
