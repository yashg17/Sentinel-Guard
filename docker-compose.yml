services:
  app:
    build: .
    container_name: sentinel-app-1
    ports:
      - "5000:5000"
    networks:
      - sentinel-net
    restart: always

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    user: root
    ports:
      - "9090:9090"
    volumes:
      - /home/ubuntu/prometheus.yml:/etc/prometheus/prometheus.yml
      - /home/ubuntu/prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - sentinel-net
    restart: always

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: cadvisor
    # NO PORTS MAPPED TO HOST = NO CONFLICTS
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - sentinel-net
    restart: always

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    # NO PORTS MAPPED TO HOST = NO CONFLICTS
    networks:
      - sentinel-net
    restart: always

networks:
  sentinel-net:
    driver: bridge
