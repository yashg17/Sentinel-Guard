version: '3.8'

services:
  app:
    build: .
    container_name: sentinel-app-1
    ports:
      - "5000:5000"
    networks:
      - sentinel-net
    restart: always

  sonarqube:
    image: sonarqube:9.9-community
    container_name: sonarqube
    ports:
      - "9005:9000"
    networks:
      - sentinel-net
    volumes:
      - sonarqube-data:/opt/sonarqube/data
    restart: always

  loki:
    image: grafana/loki:latest
    container_name: loki
    ports:
      - "3100:3100"
    networks:
      - sentinel-net
    restart: always

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - sentinel-net
    restart: always

networks:
  sentinel-net:
    driver: bridge

volumes:
  sonarqube-data:
  grafana-data:
